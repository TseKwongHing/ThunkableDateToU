<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://thunkable.github.io/webviewer-extension/thunkableWebviewerExtension.js" type="text/javascript"></script>
</head>
<body>
    <h1 id="status">going...</h1>

    <script>
        ThunkableWebviewerExtension.receiveMessage(function(message) {
            try {
                document.getElementById('status').innerText = "doing...";
                
                const dates = JSON.parse(message);
                
                if (Array.isArray(dates) && dates.length >= 2) {
                    const start = new Date(dates[0]);
                    const end = new Date(dates[1]);

                    const diffInMs = Math.abs(end - start);

                    const diffInDays = Math.ceil(diffInMs / (1000 * 60 * 60 * 24));


                    ThunkableWebviewerExtension.postMessage(diffInDays.toString());
                    document.getElementById('status').innerText = "Re: " + diffInDays;
                } else {
                    ThunkableWebviewerExtension.postMessage("Error: Invalid Input");
                }
            } catch (e) {
                ThunkableWebviewerExtension.postMessage("Error: " + e.message);
            }
        });
    </script>
</body>
</html>
